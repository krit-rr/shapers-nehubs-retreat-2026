<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — Global Shapers NE Hubs Retreat 2026</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-hero {
      padding-top: calc(var(--nav-height) + 5rem);
      padding-bottom: 3rem;
      padding-left: 2.5rem;
      padding-right: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Day tabs */
    .day-tabs {
      display: flex;
      justify-content:space-evenly;
      gap: 0;
      border-bottom: 1px solid rgba(226,226,226,0.12);
      margin-bottom: 3rem;
      overflow-x: auto;
    }

    .day-tab {
      padding: 1rem 2rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .day-tab:hover { color: var(--light); }
    .day-tab.active {
      color: #6fa0ff;
      border-bottom-color: #6fa0ff;
    }

    /* Schedule content area */
    .schedule-section {
      padding: 0 2.5rem 6rem;
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
    }

    .day-panel { display: none; }
    .day-panel.active { display: block; }

    /* Day header */
    .day-header {
      display: flex;
      align-items: center; 
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(226,226,226,0.08);
    }

    .day-header h2 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--white);
    }

    .day-header .day-date {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.4rem;
    }

    .day-theme-badge {
      padding: 0.5rem 1.25rem;
      background: rgba(22, 68, 150, 0.25);
      border: 1px solid rgba(22, 68, 150, 0.5);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--light);
      text-transform: uppercase;
      align-self: flex-start;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(to bottom, var(--gold), rgba(251,186,96,0.1));
    }

    .timeline-item {
      position: relative;
      padding: 0 0 2.5rem 2rem;
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 8px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid var(--black);
    }

    /* [TIMELINE] Text Styling */
    .timeline-title {
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .timeline-detail {
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .timeline-time {
      font-family: var(--font-body);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      padding-top: 3px;
      font-weight: 600;
    }

    .timeline-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .tag { 
      padding: 0.25rem 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid;
    }

    /* [TIMELINE] Text Styling */ 
    .timeline-item {color: var(--white);}
    .timeline-item::before {background: var(--white);}
    
    .tag {
      border-color: currentColor;
      color: inherit;
    }
    .timeline-title, .timeline-time, .timeline-detail {color: inherit;}

    .timeline-item.optional {color: var(--gray);}
    .timeline-item.meal {color: var(--gold);}
    .timeline-item.break {color: #5f91e7;}

    @media (max-width: 640px) {
      .schedule-section { padding: 0 1.5rem 4rem; }
      .page-hero { padding-left: 1.5rem; padding-right: 1.5rem; }
      .timeline-item { grid-template-columns: 1fr; gap: 0.25rem; }
      .timeline-time { padding-top: 0; }
      .day-tab { padding: 0.75rem 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="nav-logo"> Northeast Hubs Retreat '26 </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="schedule.html" class="active">Schedule</a></li>
      <li><a href="info.html">Helpful Info</a></li>
      <li><a href="about.html">About Us</a></li>
    </ul>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <p class="section-label animate-up">Scheduled programming is potentially subject to change.</p>
    <div class="gold-line"></div>
    <h1 class="section-title animate-up-2">Retreat Schedule</h1>
  </div>

  <!-- DAY TABS -->
  <div class="schedule-section">
    <div class="day-tabs">
      <button class="day-tab" onclick="showDay('day1', this)">Friday · May 15th</button>
      <button class="day-tab" onclick="showDay('day2', this)">Saturday · May 16th</button>
      <button class="day-tab" onclick="showDay('day3', this)">Sunday · May 17th</button>
    </div>

    <div class="day-panel active" id="day1">
      <div class="day-header">
        <div>
          <h2>Day 1</h2>
          <div class="day-date">Arrival & Connection</div>
        </div>
      </div>
    <div class="timeline" id="fridaySchedule"></div>
    </div>

    <div class="day-panel" id="day2">
      <div class="day-header">
        <div>
          <h2>Day 2</h2>
          <div class="day-date">Core Programming</div>
        </div>
      </div>
    <div class="timeline" id="saturdaySchedule"></div>
    </div>

    <div class="day-panel" id="day3">
      <div class="day-header">
        <div>
          <h2>Day 3</h2>
          <div class="day-date">Closure & Community</div>
        </div>
      </div>
    <div class="timeline" id="sundaySchedule"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo"> May 15–17, 2026 · Pittsburgh's Bridges of Belonging </div>
  </footer>

  <script>
    function showDay(id, btn) {
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
    // For Mobile
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => links.classList.toggle('open'));

    /* ============ SCHEDULE (Edit below) ============ */
    const schedules = {
      friday: [
        {
          time: "4:30 – 6:00 PM",
          title: "Arrival Window",
          detail: "Informal meet-up at CMU, welcome from Michael Coutinho, and orientation for early arrivals."
        },
        {
          time: "6:00 – 8:00 PM",
          title: "Drop-In Dinner",
          detail: "Casual dinner with no formal programming.",
          tag: "meal"
        },
        {
          time: "7:30 – 9:00 PM",
          title: "Exploration / Light Activities",
          detail: "Optional exploration around Pittsburgh.",
          tag: "optional"
        },
        {
          time: "9:00 PM – Late",
          title: "Optional Social",
          detail: "Informal hangouts. Early wind-down encouraged for Saturday programming.",
          tag: "optional"
        }
      ],
      saturday: [
        {
          time: "7:00 – 8:30 AM",
          title: "Morning Activities",
          detail: "Optional group activities around the city.",
          tag: "optional"
        },
        {
          time: "9:00 – 9:30 AM",
          title: "Breakfast at CMU",
          tag: "meal"
        },
        {
          time: "9:30 – 10:00 AM",
          title: "Welcome to the NE Retreat"
        },
        {
          time: "10:00 – 11:00 AM",
          title: "Community Overview + Hub Introductions"
        },
        {
          time: "11:00 – 11:30 AM",
          title: "Icebreaker Activity"
        },
        {
          time: "11:30 AM – 12:15 PM",
          title: "Shapers Roundtables"
        },
        {
          time: "12:15 PM",
          title: "Lunch",
          tag: "meal"
        },
        {
          time: "12:45 – 1:00 PM",
          title: "Reset Break",
          tag: "break"
        },
        {
          time: "1:00 – 1:45 PM",
          title: "Town Hall Discussion"
        },
        {
          time: "1:45 – 2:30 PM",
          title: "Breakout Sessions"
        },
        {
          time: "2:30 – 4:00 PM",
          title: "Service Activity"
        },
        {
          time: "4:00 – 5:30 PM",
          title: "Guided City Tour"
        },
        {
          time: "5:30 – 6:00 PM",
          title: "Free Time",
          tag: "break"
        },
        {
          time: "6:30 PM",
          title: "Group Dinner with Pods",
          tag: "meal"
        },
        {
          time: "8:30 PM – Late",
          title: "Evening Activities",
          detail: "Optional social and recreational options with both sober and non-sober options.",
          tag: "optional"
        }
      ],
      sunday: [
        {
          time: "8:30 – 9:30 AM",
          title: "Arrival + Light Breakfast",
          tag: "meal"
        },
        {
          time: "9:30 – 10:45 AM",
          title: "Closing Plenary"
        },
        {
          time: "11:00 AM – 1:00 PM",
          title: "Volunteer / Impact Activity",
          detail: "Optional community service project.",
          tag: "optional"
        }
      ]
    };
    /* ============ END SCHEDULE ============ */
    /* TIMELINE RENDERER */
    function renderSchedule(containerId, items) {
      const container = document.getElementById(containerId);
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "timeline-item";

        if(item.tag){
          div.classList.add(item.tag);
        }

        let tagHTML = "";

        if(item.tag){
          tagHTML = `
            <div class="timeline-tags">
              <span class="tag tag-${item.tag}">${item.tag}</span>
            </div>
          `;
        }

        div.innerHTML = `
          <div class="timeline-time">${item.time}</div>
          <div class="timeline-content">
            <div class="timeline-title">${item.title}</div>
            ${item.detail ? `<div class="timeline-detail">${item.detail}</div>` : ""}
            ${tagHTML}
          </div>
        `;

        container.appendChild(div);
      });
    }
    /* Render schedules */
    renderSchedule("fridaySchedule", schedules.friday);
    renderSchedule("saturdaySchedule", schedules.saturday);
    renderSchedule("sundaySchedule", schedules.sunday);
  </script>
</body>
</html>

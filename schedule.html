<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — Global Shapers NE Hubs Retreat 2026</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-hero {
      padding-top: calc(var(--nav-height) + 5rem);
      padding-bottom: 3rem;
      padding-left: 2.5rem;
      padding-right: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Day tabs */
    .day-tabs {
      display: flex;
      justify-content:space-evenly;
      gap: 0;
      border-bottom: 1px solid rgba(226,226,226,0.12);
      margin-bottom: 3rem;
      overflow-x: auto;
    }

    .day-tab {
      padding: 1rem 2rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .day-tab:hover { color: var(--light); }
    .day-tab.active {
      color: #6fa0ff;
      border-bottom-color: #6fa0ff;
    }

    /* Schedule content area */
    .schedule-section {
      padding: 0 2.5rem 6rem;
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
    }

    .day-panel { display: none; }
    .day-panel.active { display: block; }

    /* Day header */
    .day-header {
      display: flex;
      align-items: center; 
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(226,226,226,0.08);
    }

    .day-header h2 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--white);
    }

    .day-header .day-date {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.4rem;
    }

    .day-theme-badge {
      padding: 0.5rem 1.25rem;
      background: rgba(22, 68, 150, 0.25);
      border: 1px solid rgba(22, 68, 150, 0.5);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--light);
      text-transform: uppercase;
      align-self: flex-start;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(to bottom, var(--gold), rgba(251,186,96,0.1));
    }

    .timeline-item {
      position: relative;
      padding: 0 0 2.5rem 2rem;
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 8px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid var(--black);
    }

    /* [TIMELINE] Text Styling */
    .timeline-title {
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .timeline-detail {
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .timeline-time {
      font-family: var(--font-body);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      padding-top: 3px;
      font-weight: 600;
    }

    .timeline-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .tag { 
      padding: 0.25rem 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid;
    }

    /* [TIMELINE] Text Styling */ 
    .timeline-item {color: var(--white);}
    .timeline-item::before {background: var(--white);}
    
    .tag {
      border-color: currentColor;
      color: inherit;
    }
    .timeline-title, .timeline-time, .timeline-detail {color: inherit;}

    .timeline-item.optional {color: var(--gray);}
    .timeline-item.meal {color: var(--gold);}
    .timeline-item.break {color: #5f91e7;}

    @media (max-width: 640px) {
      .schedule-section { padding: 0 1.5rem 4rem; }
      .page-hero { padding-left: 1.5rem; padding-right: 1.5rem; }
      .timeline-item { grid-template-columns: 1fr; gap: 0.25rem; }
      .timeline-time { padding-top: 0; }
      .day-tab { padding: 0.75rem 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="nav-logo"> Northeast Hubs Retreat '26 </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="schedule.html" class="active">Schedule</a></li>
      <li><a href="info.html">Helpful Info</a></li>
      <li><a href="about.html">About Us</a></li>
    </ul>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <p class="section-label animate-up">Scheduled programming is potentially subject to change.</p>
    <div class="gold-line"></div>
    <h1 class="section-title animate-up-2">Retreat Schedule</h1>
  </div>

  <!-- DAY TABS -->
  <div class="schedule-section">
    <div class="day-tabs">
      <button class="day-tab" onclick="showDay('day1', this)">Friday · May 15th</button>
      <button class="day-tab" onclick="showDay('day2', this)">Saturday · May 16th</button>
      <button class="day-tab" onclick="showDay('day3', this)">Sunday · May 17th</button>
    </div>

    <div class="day-panel active" id="day1">
      <div class="day-header">
        <div>
          <h2>Day 1</h2>
          <div class="day-date">Arrival & Connection</div>
        </div>
      </div>
    <div class="timeline" id="fridaySchedule"></div>
    </div>

    <div class="day-panel" id="day2">
      <div class="day-header">
        <div>
          <h2>Day 2</h2>
          <div class="day-date">Core Programming</div>
        </div>
      </div>
    <div class="timeline" id="saturdaySchedule"></div>
    </div>

    <div class="day-panel" id="day3">
      <div class="day-header">
        <div>
          <h2>Day 3</h2>
          <div class="day-date">Closure & Community</div>
        </div>
      </div>
    <div class="timeline" id="sundaySchedule"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo"> May 15–17, 2026 · Pittsburgh's Bridges of Belonging </div>
  </footer>

  <script>
    function showDay(id, btn) {
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
    // For Mobile
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => links.classList.toggle('open'));

    /* ============ SCHEDULE (Edit below) ============ */
    const schedules = {
      friday: [
        {
          time: "2:30 – 6:00 PM",
          title: "Arrival Window",
          detail: "Joint exploration to local highlights like the Incline and Warhol Museum (RAD passes). Group transition to dinner location.",
          tag: "optional"
        },
        {
          time: "6:00 – 8:00 PM",
          title: "Drop-In Dinner",
          detail: "Casual, flexible dinner with food hall-style seating to encourage cross-hub mingling. No formal programming.",
          tag: "meal"
        },
        {
          time: "7:30 – 9:00 PM",
          title: "Exploration / Light Activities",
          detail: "Optional split activities including neighborhood walking tours, riverfront visits, bowling, or cultural options like live music, symphony, or a Pirates game with fireworks.",
          tag: "optional"
        },
        {
          time: "9:00 PM – Late",
          title: "Social",
          detail: "Casual social continuation with small group splits based on energy levels. Early wind-down encouraged for Saturday programming.",
          tag: "optional"
        }
      ],

      saturday: [
        {
          time: "7:00 – 8:30 AM",
          title: "Self-Selected Morning Activities",
          detail: "Options include such as pickleball, rock climbing, group workout.",
          tag: "optional"
        },
        {
          time: "9:00 – 9:30 AM",
          title: "Arrival Window at CMU",
          detail: "Open-style breakfast with bagels, pastries, fruit, coffee and informal networking",
          tag: "meal"
        },
        {
          time: "9:30 – 10:00 AM",
          title: "Welcome to the NE Retreat",
          detail: "Opening remarks, housekeeping, and overview of Northeast hubs with Pittsburgh context."
        },
        {
          time: "10:00 – 10:30 AM",
          title: "Icebreaker Activity",
          detail: "Interactive, movement-based session to energize participants (led by Ian Chang)."
        },
        {
          time: "10:30 – 11:15 AM",
          title: "Town Hall Discussion",
          detail: "Open forum on key Shaper issues, focusing on engagement, current events, and avoiding burnout. Facilitated discussion with shared reflections and action-oriented outcomes."
        },
        {
          time: "11:15 – 11:30 AM",
          title: "Shred the Debt",
          detail: "Origin story, updates, and campaign momentum session."
        },
        {
          time: "11:30 AM – 12:15 PM",
          title: "Shaper Panel Discussions",
          detail: "Breakout panels on topics such as new Shaper onboarding, leadership pathways, WEF opportunities, and cross-hub collaboration."
        },
        {
          time: "12:15 – 12:45 PM",
          title: "Lunch",
          detail: "Catered lunch with optional table discussions and informal networking.",
          tag: "meal"
        },
        {
          time: "12:45 – 1:15 PM",
          title: "Community Champion Session",
          detail: "Priyanka shares her story, role overview, and insights on regional impact, followed by a brief engagement activity."
        },
        {
          time: "1:20 – 2:20 PM",
          title: "Breakout Roundtables",
          detail: "Facilitated discussions continuing Town Hall themes across topics like climate, policy, civic engagement, and food systems."
        },
        {
          time: "2:30 – 4:00 PM",
          title: "Service Activity",
          detail: "Group volunteer activity in partnership with a local organization.",
        },
        {
          time: "4:00 – 4:10 PM",
          title: "Group Photo"
        },
        {
          time: "4:10 – 5:30 PM",
          title: "Guided City Tour",
          detail: "Walking tour of Oakland (led by Seong Kim)."
        },
        {
          time: "5:30 – 6:00 PM",
          title: "Free Time",
          tag: "break"
        },
        {
          time: "6:30 PM",
          title: "Group Dinner",
          detail: "Large group dinner at a shared venue with continued networking.",
          tag: "meal"
        },
        {
          time: "8:30 PM – Late",
          title: "Evening Activities",
          detail: "Optional split activities including sober options (games, views, bowling) and social venues (bars, live music, or group gatherings).",
          tag: "optional"
        }
      ],

      sunday: [
        {
          time: "8:30 – 9:30 AM",
          title: "Arrival + Light Breakfast",
          detail: "Casual breakfast with coffee, pastries, and informal seating. Flexible arrival and departure window.",
          tag: "meal"
        },
        {
          time: "9:30 – 10:45 AM",
          title: "Closing Plenary",
          detail: "Reflection on retreat themes, cross-hub insights, commitments, and next steps. Includes acknowledgments and group photo."
        },
        {
          time: "11:00 AM – 1:00 PM",
          title: "Volunteer / Impact Activity",
          detail: "Optional service opportunities with local organizations or continued cultural exploration across the city.",
          tag: "optional"
        }
      ]
    };
    /* ============ END SCHEDULE ============ */
    /* TIMELINE RENDERER */
    function renderSchedule(containerId, items) {
      const container = document.getElementById(containerId);
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "timeline-item";

        if(item.tag){
          div.classList.add(item.tag);
        }

        let tagHTML = "";

        if(item.tag){
          tagHTML = `
            <div class="timeline-tags">
              <span class="tag tag-${item.tag}">${item.tag}</span>
            </div>
          `;
        }

        div.innerHTML = `
          <div class="timeline-time">${item.time}</div>
          <div class="timeline-content">
            <div class="timeline-title">${item.title}</div>
            ${item.detail ? `<div class="timeline-detail">${item.detail}</div>` : ""}
            ${tagHTML}
          </div>
        `;

        container.appendChild(div);
      });
    }
    /* Render schedules */
    renderSchedule("fridaySchedule", schedules.friday);
    renderSchedule("saturdaySchedule", schedules.saturday);
    renderSchedule("sundaySchedule", schedules.sunday);
  </script>
</body>
</html>
